# Optional: only use if you prefer Docker over local run
# Local run instructions are in README.md
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    volumes:
      - ./backend/chroma_db:/app/chroma_db
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
